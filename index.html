<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>day colours · v0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141c;
    --panel:#1a1d27;
    --panel-2:#20242f;
    --line:#2b3140;
    --line-soft:#242938;
    --text:#e9ebf2;
    --muted:#878da2;
    --faint:#5a6072;

    --c-great:#34e3d4;
    --c-good:#46d38a;
    --c-okay:#ecc652;
    --c-rough:#ef9440;
    --c-bad:#ec5f63;

    --track:#232836;
    --radius:14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, rgba(52,227,212,.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:22px 16px calc(120px + env(safe-area-inset-bottom));
    max-width:760px;
    margin:0 auto;
    line-height:1.5;
  }

  h1,h2,h3{font-family:"Bricolage Grotesque","Inter",sans-serif;margin:0;letter-spacing:-.01em;}
  .num{font-family:"Bricolage Grotesque","Inter",sans-serif;font-variant-numeric:tabular-nums;}

  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
  header h1{font-size:30px;font-weight:800;}
  header h1 .dot{color:var(--c-great);}
  .status{color:var(--faint);font-size:12.5px;}

  .card{
    background:var(--panel);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:16px 16px 18px;
    margin-top:14px;
  }
  .card > .card-title{
    display:flex;align-items:baseline;justify-content:space-between;gap:10px;
    margin-bottom:12px;
  }
  .card-title h2{font-size:14px;font-weight:700;color:var(--muted);text-transform:lowercase;letter-spacing:.02em;font-family:"Inter",sans-serif;}
  .card-title .logged{font-size:12.5px;color:var(--faint);}

  /* distribution bar */
  .dist{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--track);gap:2px;}
  .dist .seg{min-width:2px;transition:width .35s ease;}
  .dist .seg.great{background:var(--c-great);}
  .dist .seg.good{background:var(--c-good);}
  .dist .seg.okay{background:var(--c-okay);}
  .dist .seg.rough{background:var(--c-rough);}
  .dist .seg.bad{background:var(--c-bad);}
  .dist.empty{background:var(--track);}

  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px;}
  .legend .item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);}
  .legend .swatch{width:11px;height:11px;border-radius:3px;flex:none;}
  .legend .item .cnt{color:var(--text);font-family:"Bricolage Grotesque",sans-serif;font-variant-numeric:tabular-nums;}
  .legend .emo{font-size:14px;filter:saturate(1.1);}

  .windows{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:560px){.windows{grid-template-columns:1fr 1fr;}}

  /* ribbon 360 */
  #ribbon{
    display:grid;
    grid-template-rows:repeat(7,1fr);
    grid-auto-flow:column;
    gap:3px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  #ribbon .rc{
    width:11px;height:11px;border-radius:3px;background:var(--track);
  }
  #ribbon .rc.pad{background:transparent;}
  .ribbon-scale{display:flex;justify-content:space-between;margin-top:8px;color:var(--faint);font-size:11.5px;}

  /* 30 day calendar */
  .wk-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
  .wk-head div{text-align:center;color:var(--faint);font-size:11px;letter-spacing:.04em;text-transform:uppercase;}
  #cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cell{
    aspect-ratio:1/1;border-radius:11px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:var(--panel-2);
    border:1px solid transparent;
    position:relative;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .2s ease, background .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .cell .d{font-size:12px;color:var(--muted);font-family:"Bricolage Grotesque",sans-serif;font-variant-numeric:tabular-nums;line-height:1;}
  .cell .e{font-size:15px;line-height:1;}
  .cell.rated .d{color:rgba(0,0,0,.55);font-weight:700;}
  .cell.today{outline:2px solid rgba(255,255,255,.16);outline-offset:1px;}
  .cell.locked{cursor:default;background:transparent;border-color:var(--line-soft);}
  .cell.locked .d{color:var(--faint);opacity:.7;}
  .cell.future{border-style:dashed;}
  .cell.locked.rated{opacity:.42;}
  .cell:not(.locked):hover{transform:translateY(-1px);}
  .cell:not(.locked):focus-visible{outline:2px solid var(--c-great);outline-offset:2px;}

  .cell.rated.great{background:var(--c-great);box-shadow:0 0 14px -3px var(--c-great);}
  .cell.rated.good{background:var(--c-good);box-shadow:0 0 12px -4px var(--c-good);}
  .cell.rated.okay{background:var(--c-okay);box-shadow:0 0 12px -4px var(--c-okay);}
  .cell.rated.rough{background:var(--c-rough);box-shadow:0 0 12px -4px var(--c-rough);}
  .cell.rated.bad{background:var(--c-bad);box-shadow:0 0 12px -4px var(--c-bad);}

  /* data buttons */
  .data-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  .btn{
    font-family:"Inter",sans-serif;font-size:13px;font-weight:500;
    color:var(--text);background:var(--panel-2);border:1px solid var(--line);
    padding:9px 14px;border-radius:10px;cursor:pointer;transition:border-color .15s ease, background .15s ease;
  }
  .btn:hover{border-color:var(--faint);}
  .btn:focus-visible{outline:2px solid var(--c-great);outline-offset:2px;}
  .hint{color:var(--faint);font-size:12px;margin-top:8px;}

  /* bottom rating bar */
  .today-bar{
    position:fixed;left:0;right:0;bottom:0;
    background:linear-gradient(to top, var(--bg) 62%, rgba(18,20,28,.92));
    border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    backdrop-filter:blur(8px);
    z-index:40;
  }
  .today-bar .lbl{display:flex;align-items:baseline;justify-content:space-between;gap:8px;max-width:760px;margin:0 auto 9px;}
  .today-bar .lbl h3{font-size:14px;font-weight:700;}
  .today-bar .lbl .dat{color:var(--faint);font-size:12.5px;}
  .rate-opts{display:grid;grid-template-columns:repeat(5,1fr) auto;gap:8px;max-width:760px;margin:0 auto;}
  .opt{
    border:1px solid var(--line);border-radius:12px;background:var(--panel-2);
    padding:9px 4px 7px;cursor:pointer;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:transform .1s ease, border-color .15s ease, box-shadow .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .opt .oe{font-size:21px;line-height:1;}
  .opt .ol{font-size:10.5px;color:var(--muted);}
  .opt:hover{transform:translateY(-1px);}
  .opt:focus-visible{outline:2px solid var(--c-great);outline-offset:2px;}
  .opt[data-r="great"]{border-color:color-mix(in srgb,var(--c-great) 45%,var(--line));}
  .opt[data-r="good"]{border-color:color-mix(in srgb,var(--c-good) 40%,var(--line));}
  .opt[data-r="okay"]{border-color:color-mix(in srgb,var(--c-okay) 40%,var(--line));}
  .opt[data-r="rough"]{border-color:color-mix(in srgb,var(--c-rough) 40%,var(--line));}
  .opt[data-r="bad"]{border-color:color-mix(in srgb,var(--c-bad) 40%,var(--line));}
  .opt.sel[data-r="great"]{background:var(--c-great);box-shadow:0 0 16px -4px var(--c-great);}
  .opt.sel[data-r="good"]{background:var(--c-good);}
  .opt.sel[data-r="okay"]{background:var(--c-okay);}
  .opt.sel[data-r="rough"]{background:var(--c-rough);}
  .opt.sel[data-r="bad"]{background:var(--c-bad);}
  .opt.sel .ol{color:rgba(0,0,0,.6);font-weight:600;}
  .opt.erase{justify-content:center;}
  .opt.erase .oe{font-size:17px;}
  .opt.erase .ol{font-size:10.5px;}

  /* editor overlay */
  .overlay{position:fixed;inset:0;background:rgba(8,9,13,.6);backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  @media(min-width:560px){.overlay.show{align-items:center;}}
  .sheet{
    background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
    width:100%;max-width:760px;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  }
  @media(min-width:560px){.sheet{border-radius:18px;margin:0 16px;}}
  .sheet .sh-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .sheet .sh-head h3{font-size:16px;font-weight:700;}
  .sheet .sh-head .x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;}

  @media(prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;}
  }
</style>
</head>
<body>

<header>
  <h1>day colours<span class="dot">.</span></h1>
  <div class="status" id="status">loading…</div>
</header>

<div class="card">
  <div class="windows">
    <div>
      <div class="card-title"><h2>last 30 days</h2><span class="logged" id="log30"></span></div>
      <div class="dist" id="dist30"></div>
      <div class="legend" id="leg30"></div>
    </div>
    <div>
      <div class="card-title"><h2>last 360 days</h2><span class="logged" id="log360"></span></div>
      <div class="dist" id="dist360"></div>
      <div class="legend" id="leg360"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title"><h2>last 360 days · the pile-up</h2></div>
  <div id="ribbon"></div>
  <div class="ribbon-scale"><span id="ribStart"></span><span>today</span></div>
</div>

<div class="card">
  <div class="card-title"><h2>last 30 days</h2><span class="logged">tap a day to set or change it</span></div>
  <div class="wk-head"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
  <div id="cal"></div>
</div>

<div class="card">
  <div class="card-title"><h2>your data</h2></div>
  <div class="data-row">
    <button class="btn" id="exportBtn">Export JSON</button>
    <button class="btn" id="importBtn">Import JSON</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  </div>
  <div class="hint" id="dataHint"></div>
</div>

<div class="today-bar">
  <div class="lbl"><h3>how was today?</h3><span class="dat" id="todayDate"></span></div>
  <div class="rate-opts" id="todayOpts"></div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sh-head"><h3 id="sheetDate">day</h3><button class="x" id="sheetClose" aria-label="close">✕</button></div>
    <div class="rate-opts" id="sheetOpts"></div>
  </div>
</div>

<script>
const RATINGS = [
  {id:'great', label:'yippee',   emoji:'🤩', color:'var(--c-great)'},
  {id:'good',  label:'decent',   emoji:'🙂', color:'var(--c-good)'},
  {id:'okay',  label:'eehh',     emoji:'😐', color:'var(--c-okay)'},
  {id:'rough', label:'aur naur', emoji:'🙁', color:'var(--c-rough)'},
  {id:'bad',   label:'bruh',     emoji:'💀', color:'var(--c-bad)'},
];
const RMAP = Object.fromEntries(RATINGS.map(r=>[r.id,r]));
const WIN_SHORT = 30;
const WIN_LONG  = 360;

let data = {};        // { "YYYY-MM-DD": ratingId }
let storageOK = true;

// ---- date helpers (local time) ----
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function toKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeekSun(d){ const x=new Date(d); x.setDate(x.getDate()-x.getDay()); return x; }
function fmtLong(d){ return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'}); }
function fmtShort(d){ return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

// ---- storage ----
async function load(){
  if(!window.storage){ storageOK=false; return; }
  try{
    const r = await window.storage.get('ratings', false);
    if(r && r.value) data = JSON.parse(r.value) || {};
  }catch(e){ /* key missing => empty */ }
}
async function persist(){
  if(!window.storage){ storageOK=false; setStatus(); return; }
  try{ await window.storage.set('ratings', JSON.stringify(data), false); storageOK=true; }
  catch(e){ storageOK=false; }
  setStatus();
}
function setStatus(){
  const s=document.getElementById('status');
  s.textContent = storageOK ? 'saved to your Claude account · export for a copy you own'
                            : 'saving in this session only · use export to keep it';
}

function setRating(key, id){
  if(id===null){ delete data[key]; } else { data[key]=id; }
  persist(); renderAll();
}

// ---- rating option buttons (shared markup) ----
function optButtons(currentId, onPick){
  const wrap=document.createElement('div');
  wrap.style.display='contents';
  RATINGS.forEach(r=>{
    const b=document.createElement('button');
    b.className='opt'+(currentId===r.id?' sel':'');
    b.dataset.r=r.id;
    b.innerHTML='<span class="oe">'+r.emoji+'</span><span class="ol">'+r.label+'</span>';
    b.addEventListener('click',()=>onPick(r.id));
    wrap.appendChild(b);
  });
  const er=document.createElement('button');
  er.className='opt erase';
  er.innerHTML='<span class="oe">⌫</span><span class="ol">clear</span>';
  er.addEventListener('click',()=>onPick(null));
  wrap.appendChild(er);
  return wrap;
}

// ---- render: stats windows ----
function windowStats(days){
  const T=today(); const start=addDays(T,-(days-1));
  const counts={great:0,good:0,okay:0,rough:0,bad:0}; let total=0;
  for(const [k,v] of Object.entries(data)){
    const dt=fromKey(k);
    if(dt>=start && dt<=T && counts[v]!==undefined){ counts[v]++; total++; }
  }
  return {counts,total};
}
function renderWindow(days, distId, legId, logId){
  const {counts,total}=windowStats(days);
  const dist=document.getElementById(distId);
  dist.innerHTML='';
  dist.className='dist'+(total===0?' empty':'');
  if(total>0){
    RATINGS.forEach(r=>{
      const c=counts[r.id]; if(c<=0) return;
      const seg=document.createElement('div');
      seg.className='seg '+r.id;
      seg.style.width=(c/total*100)+'%';
      dist.appendChild(seg);
    });
  }
  const leg=document.getElementById(legId); leg.innerHTML='';
  RATINGS.forEach(r=>{
    const item=document.createElement('div'); item.className='item';
    item.innerHTML='<span class="swatch" style="background:'+r.color+'"></span>'
      +'<span class="emo">'+r.emoji+'</span>'
      +'<span class="cnt num">'+counts[r.id]+'</span>';
    leg.appendChild(item);
  });
  document.getElementById(logId).textContent = total+' logged';
}

// ---- render: ribbon 360 ----
function renderRibbon(){
  const T=today();
  const rStart=addDays(T,-(WIN_LONG-1));
  const gridStart=startOfWeekSun(rStart);
  const gridEnd=addDays(startOfWeekSun(T),6);
  const rib=document.getElementById('ribbon'); rib.innerHTML='';
  for(let d=new Date(gridStart); d<=gridEnd; d=addDays(d,1)){
    const cell=document.createElement('div');
    const inRange = d>=rStart && d<=T;
    if(!inRange){ cell.className='rc pad'; }
    else{
      const id=data[toKey(d)];
      if(id){ cell.className='rc'; cell.style.background=RMAP[id].color; cell.style.boxShadow='0 0 7px -3px '+RMAP[id].color; }
      else{ cell.className='rc'; }
      cell.title=fmtShort(d)+(id?' · '+RMAP[id].label:'');
    }
    rib.appendChild(cell);
  }
  document.getElementById('ribStart').textContent=fmtShort(rStart);
}

// ---- render: 30-day calendar ----
function renderCal(){
  const T=today();
  const winStart=addDays(T,-(WIN_SHORT-1));
  const gridStart=startOfWeekSun(winStart);
  const gridEnd=addDays(startOfWeekSun(T),6);
  const cal=document.getElementById('cal'); cal.innerHTML='';
  for(let d=new Date(gridStart); d<=gridEnd; d=addDays(d,1)){
    const key=toKey(d);
    const inWin = d>=winStart && d<=T;
    const isFuture = d>T;
    const id=data[key];
    const cell=document.createElement('div');
    let cls='cell';
    if(id) cls+=' rated '+id;
    if(!inWin) cls+=' locked';
    if(isFuture) cls+=' future';
    if(key===toKey(T)) cls+=' today';
    cell.className=cls;
    cell.innerHTML='<span class="d">'+d.getDate()+'</span>'+(id?'<span class="e">'+RMAP[id].emoji+'</span>':'');
    if(inWin){
      cell.setAttribute('tabindex','0');
      cell.setAttribute('role','button');
      cell.title=fmtLong(d)+(id?' · '+RMAP[id].label:'');
      const open=()=>openEditor(key,d);
      cell.addEventListener('click',open);
      cell.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
    }
    cal.appendChild(cell);
  }
}

// ---- render: bottom today bar ----
function renderTodayBar(){
  const T=today(); const key=toKey(T);
  document.getElementById('todayDate').textContent=fmtLong(T);
  const opts=document.getElementById('todayOpts'); opts.innerHTML='';
  opts.appendChild(optButtons(data[key], id=>setRating(key,id)));
}

// ---- editor sheet ----
let editorKey=null;
function openEditor(key,d){
  editorKey=key;
  document.getElementById('sheetDate').textContent=fmtLong(d);
  const opts=document.getElementById('sheetOpts'); opts.innerHTML='';
  opts.appendChild(optButtons(data[key], id=>{ setRating(key,id); closeEditor(); }));
  document.getElementById('overlay').classList.add('show');
}
function closeEditor(){ document.getElementById('overlay').classList.remove('show'); editorKey=null; }
document.getElementById('sheetClose').addEventListener('click',closeEditor);
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeEditor(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeEditor(); });

// ---- export / import ----
document.getElementById('exportBtn').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='day-colours-'+toKey(today())+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const obj=JSON.parse(rd.result);
      let added=0;
      for(const [k,v] of Object.entries(obj)){
        if(/^\d{4}-\d{2}-\d{2}$/.test(k) && RMAP[v]){ data[k]=v; added++; }
      }
      persist(); renderAll();
      document.getElementById('dataHint').textContent='merged '+added+' day(s) from file.';
    }catch(e){
      document.getElementById('dataHint').textContent='that file would not parse as day-colours JSON.';
    }
  };
  rd.readAsText(f);
  ev.target.value='';
});

function renderAll(){
  renderWindow(WIN_SHORT,'dist30','leg30','log30');
  renderWindow(WIN_LONG,'dist360','leg360','log360');
  renderRibbon();
  renderCal();
  renderTodayBar();
}

document.getElementById('dataHint').textContent='export gives you a JSON file that is yours. import merges a file back in (same-day entries overwrite).';

(async function init(){
  await load();
  setStatus();
  renderAll();
})();
</script>
</body>
</html>
